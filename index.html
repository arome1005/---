<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="新概念英语 New Concept English 听力与课文播放器，支持课本选择、课程列表、逐句播放与中英对照。" />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <link rel="canonical" href="https://nce.ichochy.com/" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#f7f3ee" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1317" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta property="og:locale" content="zh_CN" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="新概念英语 NCE" />
  <meta property="og:title" content="新概念英语 NCE 听力播放器 | New Concept English" />
  <meta property="og:description" content="新概念英语 New Concept English 听力与课文播放器，支持课本选择、课程列表、逐句播放与中英对照。" />
  <meta property="og:url" content="https://nce.ichochy.com/" />
  <meta property="og:image" content="https://nce.ichochy.com/screenshot/pc.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="新概念英语 NCE 听力播放器 | New Concept English" />
  <meta name="twitter:description" content="新概念英语 New Concept English 听力与课文播放器，支持课本选择、课程列表、逐句播放与中英对照。" />
  <meta name="twitter:image" content="https://nce.ichochy.com/screenshot/pc.png" />
  <title>新概念英语 NCE 听力播放器 | New Concept English</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "新概念英语 NCE",
      "url": "https://nce.ichochy.com/",
      "description": "新概念英语 New Concept English 听力与课文播放器，支持课本选择、课程列表、逐句播放与中英对照。",
      "inLanguage": "zh-CN"
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "新概念英语 NCE 听力播放器",
      "url": "https://nce.ichochy.com/",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "All",
      "isAccessibleForFree": true,
      "description": "新概念英语 New Concept English 听力与课文播放器，支持课本选择、课程列表、逐句播放与中英对照。",
      "inLanguage": "zh-CN",
      "image": "https://nce.ichochy.com/screenshot/pc.png"
    }
  </script>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-content">
      <h1>新概念英语</h1>
      <p class="subtitle">New Concept English</p>
    </div>
    <div class="header-actions">
      <button id="themeToggle" class="theme-toggle" aria-label="切换主题">
      <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5" />
        <path
          d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path
          d="M17.5 11.18C16.82 11.39 16.11 11.5 15.37 11.5C11.47 11.5 8.31 8.34 8.31 4.44C8.31 3.7 8.42 2.99 8.63 2.31C5.46 3.07 3 5.92 3 9.37C3 13.27 6.16 16.43 10.06 16.43C13.51 16.43 16.36 13.97 17.12 10.8"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      </button>
    </div>
  </header>

  <div class="container">
    <aside class="unit-list desktop-only">
      <div class="sidebar-header">
        <h2>课程</h2>
        <div class="teacher-selector sidebar-teacher-selector">
          <label class="teacher-label">
            <input type="radio" name="teacher" value="textbook" checked> 
            <span>📖 课文</span>
          </label>
          <label class="teacher-label">
            <input type="radio" name="teacher" value="shirley"> 
            <span>雪梨老师</span>
          </label>
          <label class="teacher-label">
            <input type="radio" name="teacher" value="frank"> 
            <span>Frank 老师</span>
          </label>
        </div>
        <div class="sidebar-course-tree" id="courseTree">
          <!-- Course tree will be rendered here -->
        </div>
      </div>
    </aside>

    <div class="player-column">
      <main class="player-section">
        <div class="book-info">
          <img id="bookCover" src="" alt="课本封面" class="book-cover" />
          <div class="unit-info">
            <div class="unit-title-group">
              <div class="book-title-row">
                <h2 id="bookName" class="book-name"></h2>
                <p id="bookLevel" class="book-level"></p>
              </div>
            </div>
          </div>
        </div>

      <section class="control-panel" aria-label="课程与播放控制区">
        <div class="control-top-row">
          <button id="linkLocalFolder" class="link-folder-btn" title="关联本地视频文件夹">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"></path></svg>
            <span id="linkFolderText">关联本地视频</span>
          </button>
          <div class="font-settings">
            <button id="aiExplainBtn" class="ai-explain-btn" title="AI 讲解">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2a10 10 0 0 1 10 10h-10V2z"></path><path d="M12 12L2.8 2.2"></path><path d="M12 12L19 12.2"></path><path d="M12 12L12 22"></path></svg>
              <span>AI 讲解</span>
            </button>
            <select id="fontFamilySelect">
              <option value="var(--font-display)">默认字体</option>
              <option value="'Inter', sans-serif">Inter (现代)</option>
              <option value="'Georgia', serif">Georgia (优雅)</option>
              <option value="'American Typewriter', serif">American Typewriter</option>
              <option value="'Avenir Next', sans-serif">Avenir Next</option>
              <option value="'Apple Chancery', cursive">Apple Chancery</option>
              <option value="'Andale Mono', monospace">Andale Mono</option>
              <option value="'Optima', sans-serif">Optima</option>
              <option value="'Palatino', serif">Palatino</option>
              <option value="'Verdana', sans-serif">Verdana</option>
              <option value="'cursive'">手写体</option>
            </select>
            <button id="decreaseFontSize">A-</button>
            <button id="increaseFontSize">A+</button>
          </div>
          <input type="file" id="localFolderInput" webkitdirectory directory multiple style="display: none;">
        </div>
        <div class="navigation-buttons">
        <button id="prevUnitBtn" class="nav-btn prev-btn" title="上一课">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M12 16L7 11L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
          </svg>
        </button>
            <button id="playPauseBtn" class="play-btn" aria-label="播放或暂停" disabled>
            <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg class="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
            </svg>
          </button>

        <button id="nextUnitBtn" class="nav-btn next-btn" title="下一课">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M8 4L13 9L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
          </svg>
        </button>
        <button id="speedBtn" class="speed-btn" title="播放速度">
          <span id="speedText">1.0x</span>
        </button>
          <button id="toggleTranslationBtn" class="toggle-translation-btn" type="button" aria-pressed="false">
            中
          </button>
          <button id="playModeBtn" class="play-mode-btn" type="button" title="单句点读" aria-label="单句点读" aria-pressed="false">
          <svg class="mode-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <g class="single-icon">
              <path d="M10.4 5.1L14 9l-3.6 3.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M4.4 9h8.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <circle cx="4.5" cy="4.7" r="2.1" stroke="currentColor" stroke-width="1.4" />
              <path d="M4.2 3.8h.7v1.9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g class="continuous-icon">
              <path d="M5 5.2h6.1c1.2 0 2.2 1 2.2 2.2v.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M11.7 3.8L13.9 6l-2.2 2.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M13 12.8H6.9c-1.2 0-2.2-1-2.2-2.2V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M6.3 15.2L4.1 13l2.2-2.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </g>
          </svg>
        </button>
        </div>
        <div class="audio-player">
          <audio id="audioPlayer"></audio>
          <div class="progress-container">
            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-handle" id="progressHandle"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="lyrics-container" aria-label="双语歌词区">
        <div id="lyricsDisplay" class="lyrics-display">
          <p class="placeholder">选择一个Unit开始学习...</p>
        </div>
      </section>

      <section id="catalogContainer" class="catalog-container" style="display: none;">
        <div class="catalog-header">
          <h2 id="catalogTitle">课程目录</h2>
          <span id="catalogCount" class="catalog-count">0 个视频</span>
        </div>
        <div id="catalogGrid" class="catalog-grid"></div>
      </section>
      </main>
    </div>
  </div>

  <footer class="footer">
    <span>©2026 iReader.</span>
    <a  target="_blank"  href="https://github.com/iChochy/NCE"><span>GitHub</span></a>
    <a  target="_blank"  href="https://github.com/iChochy/NCE/issues"><span>issues</span></a>
  </footer>

  <div id="videoFloatingWindow" class="floating-video" style="display: none;">
    <div class="video-header" id="videoHeader">
      <span id="videoTitle">视频播放</span>
      <div class="video-controls">
        <button id="togglePlaylistBtn" class="playlist-toggle" title="显示/隐藏播放列表">☰ 列表</button>
        <button id="toggleExerciseBtn" class="exercise-toggle" style="display: none;">切换练习课</button>
        <button id="closeVideoBtn" class="close-btn">×</button>
      </div>
    </div>
    <div class="video-main-container" style="display: flex; height: 100%;">
      <div class="video-body" style="flex: 1;">
        <video id="mainVideo" controls width="100%"></video>
      </div>
      <div id="videoPlaylist" class="video-playlist" style="display: none;">
        <div class="playlist-header">课程列表</div>
        <div id="playlistItems" class="playlist-items"></div>
      </div>
    </div>
    <div class="resize-handle"></div>
  </div>

</div>

  <div id="aiModal" class="ai-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center;">
    <div class="ai-modal-content" style="background: #f7f3ee; color: #333; width: 90%; max-width: 600px; max-height: 80%; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div class="ai-modal-header" style="padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0; font-size: 18px;">AI 讲解</h3>
        <button id="closeAiModal" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">&times;</button>
      </div>
      <div id="aiContent" class="ai-modal-body" style="padding: 20px; overflow-y: auto; line-height: 1.6; font-size: 15px;">
        <div class="ai-loading" style="text-align: center; padding: 20px;">
          <div class="spinner" style="border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid #4a90e2; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
          <span>AI 正在思考中...</span>
        </div>
      </div>
      <div class="ai-modal-footer" style="padding: 12px 20px; border-top: 1px solid rgba(0,0,0,0.1); text-align: right; font-size: 12px; color: #888;">
        由 Gemini AI 提供支持
      </div>
    </div>
  </div>

  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .ai-modal-body h4 { margin-top: 0; color: #4a90e2; }
    .ai-modal-body p { margin-bottom: 12px; }
    .ai-modal-body ul { padding-left: 20px; margin-bottom: 12px; }
    .ai-modal-body li { margin-bottom: 6px; }
  </style>

<script type="module" src="js/main.js"></script>
</body>
</html>
